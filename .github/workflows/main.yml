name: Node.js CI

on:
  push:
    branches:
      - "**"
    paths:
      - "__tests__/**"
      - "src/**"
      - ".github/workflows/main.yml"
      - "package.json"
      - "dist/**"
  pull_request:
    branches: [main]
    paths:
      [
        "package.json",
        "package-lock.json",
        "src/**",
        ".github/workflows/main.yml",
      ]

permissions:
  contents: read
  actions: read
  id-token: write
  security-events: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Use Node.js 24
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: 24
          cache: "npm"

      - run: npm ci

      - run: npm run lint
