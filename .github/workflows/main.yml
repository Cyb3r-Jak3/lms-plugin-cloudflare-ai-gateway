name: Node.js CI

on:
  push:
    branches:
      - "**"
    paths:
      - "__tests__/**"
      - "src/**"
      - ".github/workflows/main.yml"
      - "package.json"
      - "dist/**"
  pull_request:
    branches: [main]
    paths:
      [
        "package.json",
        "package-lock.json",
        "src/**",
        ".github/workflows/main.yml",
      ]

permissions:
  contents: read
  actions: read
  id-token: write
  security-events: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Use Node.js 24
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: "npm"

      - run: npm ci

      - run: npm run lint
