name: Node.js CI

on:
  push:
    branches:
      - "**"
    paths:
      - "__tests__/**"
      - "src/**"
      - ".github/workflows/main.yml"
      - "package.json"
      - "dist/**"
  pull_request:
    branches: [main]
    paths:
      [
        "package.json",
        "package-lock.json",
        "src/**",
        ".github/workflows/main.yml",
      ]

permissions:
  contents: read
  actions: read
  id-token: write
  security-events: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Use Node.js 24
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: "npm"

      - run: npm ci

      - run: npm run lint
